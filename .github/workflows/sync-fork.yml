name: Sync Fork (Keep My Code)

on:
  schedule:
    - cron: '0 */23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync with Upstream (Keep My Changes)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get upstream repo URL
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          UPSTREAM=$(gh api repos/${{ github.repository }} --jq '.parent.full_name')
          if [ -z "$UPSTREAM" ] || [ "$UPSTREAM" = "null" ]; then
            echo "This repo is not a fork!"
            exit 1
          fi
          echo "repo=$UPSTREAM" >> $GITHUB_OUTPUT
          echo "Upstream found: $UPSTREAM"

      - name: Config Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream (Giữ code của mình khi có xung đột)
        id: merge
        run: |
          git config --global core.fsmonitor false
          rm -f .git/index.lock
          git remote add upstream https://github.com/${{ steps.upstream.outputs.repo }}.git
          git fetch upstream main
          BEFORE=$(git rev-parse HEAD)
          if ! git -c core.fsmonitor=false merge upstream/main --strategy-option ours --allow-unrelated-histories --no-edit; then
            rm -f .git/index.lock
            git -c core.fsmonitor=false checkout --ours shared/build.gradle.kts shared/src/commonMain/kotlin/com/app/ralaunch/shared/core/data/local/CommonControlLayoutStorage.kt shared/src/commonMain/kotlin/com/app/ralaunch/shared/core/data/local/CommonGameListStorage.kt
            rm -f .git/index.lock
            git -c core.fsmonitor=false add shared/build.gradle.kts shared/src/commonMain/kotlin/com/app/ralaunch/shared/core/data/local/CommonControlLayoutStorage.kt shared/src/commonMain/kotlin/com/app/ralaunch/shared/core/data/local/CommonGameListStorage.kt
            rm -f .git/index.lock
            git -c core.fsmonitor=false commit --no-edit
          fi
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push
        if: steps.merge.outputs.changed == 'true'
        run: git push origin main
