workflows:
  android-release-workflow:
    name: Build RAL Release APK
    # Use standard Linux machine (faster for Android builds)
    instance_type: linux_x2 
    
    environment:
      java: 17
      vars:
        ANDROID_COMPILE_SDK: "36"
        ANDROID_BUILD_TOOLS: "36.0.0"
        ANDROID_NDK_VERSION: "28.0.13004108"
        ANDROID_CMAKE_VERSION: "3.22.1"

    # Cache Gradle and Native build files to speed up subsequent builds
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - app/.cxx
        - app/build/intermediates/cxx

    scripts:
      - name: Initialize Git Submodules
        script: |
          echo "Setting up HTTPS fallback for submodules..."
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          
          echo "Syncing and updating submodules..."
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Install SDK, NDK and CMake
        script: |
          echo "Accepting licenses..."
          yes | sdkmanager --licenses || true
          
          echo "Installing specific NDK and CMake versions..."
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}" "cmake;${ANDROID_CMAKE_VERSION}" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Build Android Release APK
        script: |
          echo "Making gradlew executable..."
          chmod +x gradlew
          
          echo "Building Release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign Release APK
        script: |
          echo "Generating temporary keystore..."
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"

          RELEASE_DIR="app/build/outputs/apk/release"
          
          # Find the generated APK
          FOUND_APK=$(find "$RELEASE_DIR" -name "*.apk" | head -1)

          if [ -z "$FOUND_APK" ]; then
            echo "Error: No APK found!"
            exit 1
          fi

          echo "Found APK: $FOUND_APK"
          OUTPUT_APK="$RELEASE_DIR/RAL-release.apk"

          # Sign the APK
          echo "Signing APK..."
          $ANDROID_SDK_ROOT/build-tools/${ANDROID_BUILD_TOOLS}/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$OUTPUT_APK" \
            "$FOUND_APK"

          echo "APK signed successfully: $OUTPUT_APK"

    artifacts:
      - app/build/outputs/apk/release/RAL-release.apk
      - app/build/outputs/mapping/**/mapping.txt # Upload Proguard/R8 mapping if exists

        notify:
          success: true
          failure: true
